<!DOCTYPE html>
<html>
<head>

    <title>College Dashboard</title>

    <style>

        body{
            margin:0;
            display:flex;
        }

        .sidebar{
            background-color:black;
            color:white;
            padding:20px;
            height:100vh;
            width:20vw;
        }

        .cards{
            padding:20px;
            background-color:lightblue;
            width:80vw;
        }

        .card{
            border:2px solid black;
            border-radius:20px;
            color:blue;
            background:white;
            padding:20px;
            margin-bottom:20px;
        }

    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h1>Dashboard</h1>

        <ul>
            <li>Students</li>
            <li>Exam</li>
            <li>Practicals</li>
        </ul>
    </div>
     <!-- Cards -->
    <div class="cards">

        <div class="card">
            <h1>Students</h1>
            <p>200 students in IT Department</p>
        </div>

        <div class="card">
            <h1>Exam</h1>
            <p>Semester examination details</p>
        </div>

        <div class="card">
            <h1>Practicals</h1>
            <p>Practical schedule available</p>
        </div>
    </div>
</body>
</html>
